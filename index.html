<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Playwright Reports</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --surface: #ffffff;
      --text: #1f2328;
      --muted: #667085;
      --border: #d8dce2;
      --accent: #0f766e;
      --accent-soft: #e5f4f1;
      --success: #15803d;
      --success-soft: #eaf7ee;
      --failure: #b42318;
      --failure-soft: #fff0ed;
      --flaky: #ca8a04;
      --flaky-soft: #fef9c3;
      --shadow: 0 12px 34px rgb(31 35 40 / 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, #e5f4f1, transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(960px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 3rem 0;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 42rem;
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .status {
      margin: 2rem 0;
      color: var(--muted);
    }

    .reports {
      display: grid;
      gap: 0.875rem;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .report {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 0.4rem solid var(--border);
      border-radius: 0.5rem;
      box-shadow: var(--shadow);
    }

    .report[data-status="passed"] {
      border-left-color: var(--success);
      background: linear-gradient(90deg, var(--success-soft), var(--surface) 42%);
    }

    .report[data-status="failed"] {
      border-left-color: var(--failure);
      background: linear-gradient(90deg, var(--failure-soft), var(--surface) 42%);
    }

    .report[data-status="flaky"] {
      border-left-color: var(--flaky);
      background: linear-gradient(90deg, var(--flaky-soft), var(--surface) 42%);
    }

    .report a {
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration-color: var(--accent);
      text-underline-offset: 0.25rem;
    }

    .report a:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 4px;
      border-radius: 0.25rem;
    }

    .meta {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      padding: 0.35rem 0.6rem;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .report-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .result-badge {
      padding: 0.35rem 0.6rem;
      background: #f2f4f7;
      color: var(--muted);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .result-passed {
      background: var(--success-soft);
      color: var(--success);
    }

    .result-failed {
      background: var(--failure-soft);
      color: var(--failure);
    }

    .result-flaky {
      background: var(--flaky-soft);
      color: var(--flaky);
    }

    .empty,
    .error {
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
    }

    @media (max-width: 640px) {
      main {
        padding-top: 2rem;
      }

      .report {
        grid-template-columns: 1fr;
      }

      .badge {
        width: fit-content;
      }

      .report-badges {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>Playwright Reports</h1>
      <p class="subtitle">
        Latest saved reports from the main branch.
      </p>
    </header>

    <p id="status" class="status" role="status">Loading latest runs...</p>
    <ol id="reports" class="reports" aria-label="Latest Playwright reports"></ol>
  </main>

  <script src="reports.js" defer></script>
</body>

</html>
