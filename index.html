<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Playwright Reports</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --surface: #ffffff;
      --text: #1f2328;
      --muted: #667085;
      --border: #d8dce2;
      --accent: #0f766e;
      --accent-soft: #e5f4f1;
      --shadow: 0 12px 34px rgb(31 35 40 / 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, #e5f4f1, transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(960px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 3rem 0;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 42rem;
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .status {
      margin: 2rem 0;
      color: var(--muted);
    }

    .reports {
      display: grid;
      gap: 0.875rem;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .report {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      box-shadow: var(--shadow);
    }

    .report a {
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration-color: var(--accent);
      text-underline-offset: 0.25rem;
    }

    .report a:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 4px;
      border-radius: 0.25rem;
    }

    .meta {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      padding: 0.35rem 0.6rem;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .empty,
    .error {
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
    }

    @media (max-width: 640px) {
      main {
        padding-top: 2rem;
      }

      .report {
        grid-template-columns: 1fr;
      }

      .badge {
        width: fit-content;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>Playwright Reports</h1>
      <p class="subtitle">
        Latest saved reports from the main branch.
      </p>
    </header>

    <p id="status" class="status" role="status">Loading reports...</p>
    <ol id="reports" class="reports" aria-label="Latest Playwright reports"></ol>
  </main>

  <script>
    const owner = "angelarhsantos";
    const repo = "pages";
    const branch = "reports";
    const reportsPath = "reports/main";
    const maxReports = 10;

    const statusElement = document.querySelector("#status");
    const reportsElement = document.querySelector("#reports");

    loadReports();

    async function loadReports() {
      try {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${reportsPath}?ref=${branch}`;
        const response = await fetch(url, {
          headers: { Accept: "application/vnd.github+json" },
        });

        if (!response.ok) {
          throw new Error(`GitHub returned ${response.status}`);
        }

        const entries = await response.json();
        const reports = entries
          .filter((entry) => entry.type === "dir")
          .filter((entry) => /^run-\d+-\d{14}$/.test(entry.name))
          .sort((left, right) => getTimestamp(right.name).localeCompare(getTimestamp(left.name)))
          .slice(0, maxReports);

        renderReports(reports);
      } catch (error) {
        statusElement.textContent = "";
        reportsElement.innerHTML = `
            <li class="error">
              Reports could not be loaded. Open the reports/main folder directly or try again later.
            </li>
          `;
      }
    }

    function renderReports(reports) {
      if (reports.length === 0) {
        statusElement.textContent = "";
        reportsElement.innerHTML = `<li class="empty">No reports have been saved yet.</li>`;
        return;
      }

      statusElement.textContent = `Showing the latest ${reports.length} reports.`;

      reportsElement.innerHTML = reports
        .map((report, index) => {
          const details = parseReportName(report.name);
          const href = `${reportsPath}/${report.name}/index.html`;
          const badge = index === 0 ? `<span class="badge">Latest</span>` : "";

          return `
              <li class="report">
                <div>
                  <a href="${href}">Run #${details.runNumber}</a>
                  <div class="meta">${details.dateLabel}</div>
                </div>
                ${badge}
              </li>
            `;
        })
        .join("");
    }

    function parseReportName(name) {
      const [, runNumber, timestamp] = name.match(/^run-(\d+)-(\d{14})$/);
      const year = timestamp.slice(0, 4);
      const month = timestamp.slice(4, 6);
      const day = timestamp.slice(6, 8);
      const hour = timestamp.slice(8, 10);
      const minute = timestamp.slice(10, 12);
      const second = timestamp.slice(12, 14);

      const date = new Date(`${year}-${month}-${day}T${hour}:${minute}:${second}Z`);

      return {
        runNumber,
        dateLabel: date.toLocaleString(undefined, {
          dateStyle: "medium",
          timeStyle: "short",
          timeZoneName: "short",
        }),
      };
    }

    function getTimestamp(name) {
      return name.match(/^run-\d+-(\d{14})$/)?.[1] ?? "";
    }
  </script>
</body>

</html>
