name: Playwright Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: playwright-reports
  cancel-in-progress: false

jobs:
  test-and-publish-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: |
          npx playwright test

      - name: Publish report to reports branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin reports:reports
          git worktree add reports-history reports

          report_name="run-${GITHUB_RUN_NUMBER}-${time:now:yyyyMMddHHmmss}"
          report_dir="reports/main/${report_name}"

          cd reports-history

          mkdir -p "$report_dir"
          cp -a ../playwright-report/. "$report_dir/"

          git add .
          git commit -m "Save Playwright report for run ${GITHUB_RUN_NUMBER}"
          git push origin HEAD:reports
          